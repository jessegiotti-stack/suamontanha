<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  width:1200px; height:630px; overflow:hidden;
  background:#ECE7DC; color:#1C1916;
  font-family:'Inter',sans-serif;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  position:relative;
}
svg{
  position:absolute; left:50%; top:54%;
  transform:translate(-50%,-50%);
  width:980px; height:auto; opacity:.30;
}
svg path{fill:none; stroke:#1C1916; stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round}
.eyebrow{
  position:relative; z-index:1;
  font-size:17px; letter-spacing:.3em; text-transform:uppercase;
  color:#7A7268; font-weight:400; margin-bottom:34px;
}
h1{
  position:relative; z-index:1;
  font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:300;
  font-size:104px; line-height:1.04; text-align:center; letter-spacing:.01em;
}
.foot{
  position:absolute; z-index:1; bottom:44px; left:0; right:0;
  text-align:center; font-size:14px; letter-spacing:.26em;
  text-transform:uppercase; color:#7A7268;
}
</style>
</head>
<body>
  <svg viewBox="0 0 700 400">
    <path d="M20 392 L110 306 L156 330 L218 226 L268 172 L316 122 L344 66 L352 84 L348 102 L372 148 L404 214 L448 262 L502 296 L560 330 L676 392"/>
  </svg>
  <div class="eyebrow">Os Alpes em cinco vibes</div>
  <h1>Qual é a sua<br>montanha?</h1>
  <div class="foot">Menton Travel Boutique · Inverno 26/27</div>
</body>
</html>
